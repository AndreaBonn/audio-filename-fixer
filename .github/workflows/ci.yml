name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v --junitxml=test-results.xml

      - name: Generate test badge
        if: always() && matrix.python-version == '3.13' && github.ref == 'refs/heads/main'
        run: |
          python3 -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
          tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
          failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
          errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badge
        if: always() && matrix.python-version == '3.13' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json
          git diff --cached --quiet || git commit -m "ci: update test badge [skip ci]"
          git push
